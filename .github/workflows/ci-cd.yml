name: CI/CD Pipeline
on:
  push:
    branches: ['*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r server/requirements.txt 2>&1 | tail -3
      - run: python -V
      - run: |
          cd server
          python manage.py makemigrations djangoapp 2>&1
          python manage.py migrate 2>&1
          python manage.py shell -c "
from djangoapp.populate import initiate
from djangoapp.models import CarMake
initiate()
print(f'OK: {CarMake.objects.count()} makes created')
"
