name: CI/CD Pipeline

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  build:
    name: Django Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          cd server
          pip install -r requirements.txt 2>&1 | tail -3
      - name: Migrate
        run: |
          cd server
          python manage.py makemigrations djangoapp 2>&1
          python manage.py migrate 2>&1
      - name: Test cars
        run: |
          cd server
          echo "Testing get_cars..."
          python manage.py shell -c "
from djangoapp.models import CarMake
count = CarMake.objects.count()
print(f'CarMakes: {count}')
"
      - name: Done
        run: echo "CI/CD pipeline completed successfully!"
